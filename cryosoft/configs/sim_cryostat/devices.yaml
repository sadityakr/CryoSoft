# Default data directory (outside CryoSoft folder)
data_directory: "C:/CryoData"

real_drivers:
  ips_x:
    class: cryosoft.drivers.sim_oxford_ips120.SimOxfordIPS120
    address: "SIM::IPS_X"
  ips_y:
    class: cryosoft.drivers.sim_oxford_ips120.SimOxfordIPS120
    address: "SIM::IPS_Y"
  itc_vti:
    class: cryosoft.drivers.sim_oxford_itc503.SimOxfordITC503
    address: "SIM::ITC_VTI"
  itc_sample:
    class: cryosoft.drivers.sim_oxford_itc503.SimOxfordITC503
    address: "SIM::ITC_SAMPLE"
  ilm:
    class: cryosoft.drivers.sim_oxford_ilm200.SimOxfordILM200
    address: "SIM::ILM"
  keithley_6221:
    class: cryosoft.drivers.sim_keithley_6221.SimKeithley6221
    address: "SIM::K6221"
  keithley_2182a:
    class: cryosoft.drivers.sim_keithley_2182a.SimKeithley2182A
    address: "SIM::K2182A"
  k705:
    class: cryosoft.drivers.sim_keithley_705.SimKeithley705
    address: "SIM::K705"
  rotator_drv:
    class: cryosoft.drivers.sim_rotator.SimRotator
    address: "SIM::ROTATOR"
  lockin_drv:
    class: cryosoft.drivers.sim_lockin.SimLockIn
    address: "SIM::LOCKIN"

virtual_instruments:
  magnet_z:
    class: cryosoft.virtual_instruments.magnet.superconducting_magnet.SuperconductingMagnetVI
    drivers: {main: ips_x}
    vi_type: system
    init_params:
      amperes_per_tesla: 10.0
      max_current: 90.0
      min_current: -90.0
      default_ramp_rate: 5.0
      ramp_segments:
        - {max_current_A: 40.0, rate_A_per_min: 5.0}
        - {max_current_A: 70.0, rate_A_per_min: 3.0}
        - {max_current_A: 90.0, rate_A_per_min: 1.0}
    metadata:
      role: X-axis magnet
      manufacturer: Oxford Instruments
      model: IPS120-10
  magnet_y:
    class: cryosoft.virtual_instruments.magnet.superconducting_magnet.SuperconductingMagnetVI
    drivers: {main: ips_y}
    vi_type: system
    init_params:
      amperes_per_tesla: 5.0
      max_current: 20.0
      min_current: -20.0
      default_ramp_rate: 2.0
    metadata:
      role: Y-axis magnet
      manufacturer: Oxford Instruments
      model: IPS120-10
  temperature_vti:
    class: cryosoft.virtual_instruments.temperature.vti_temperature_controller.VTITemperatureControllerVI
    drivers: {main: itc_vti}
    vi_type: system
    init_params:
      default_ramp_rate: 2.0
      tolerance: 0.5
      # Setup limits enforced on user @control actions (control-validation standard)
      min_temperature_K: 1.4
      max_temperature_K: 320.0
      max_ramp_rate_K_per_min: 20.0
    metadata:
      role: VTI temperature controller
      manufacturer: Oxford Instruments
      model: ITC503
  temperature_sample:
    class: cryosoft.virtual_instruments.temperature.sample_temperature_controller.SampleTemperatureControllerVI
    drivers: {main: itc_sample}
    vi_type: system
    init_params:
      default_ramp_rate: 1.0
      tolerance: 0.3
      # Setup limits enforced on user @control actions (control-validation standard)
      min_temperature_K: 1.4
      max_temperature_K: 320.0
      max_ramp_rate_K_per_min: 20.0
    metadata:
      role: Sample-space temperature controller
      manufacturer: Oxford Instruments
      model: ITC503
  level_meter:
    class: cryosoft.virtual_instruments.level.cryogen_level_meter.CryogenLevelMeterVI
    drivers: {main: ilm}
    vi_type: level
    init_params:
      helium_low_threshold: 20.0
      buffer_size: 5
    metadata:
      role: Helium/nitrogen level meter
      manufacturer: Oxford Instruments
      model: ILM200
  keithley_delta_mode:
    class: cryosoft.virtual_instruments.measurement.measurement_delta_mode.DeltaModeMeasurementVI
    drivers: {source: keithley_6221, meter: keithley_2182a}
    vi_type: measurement
    init_params: {}
    metadata:
      role: Delta-mode resistance measurement (source + nanovoltmeter pair)
      manufacturer: Keithley
      model: 6221 + 2182A
  dc_measurement:
    class: cryosoft.virtual_instruments.measurement.dc_separate_measurement.DCSeparateMeasurementVI
    drivers: {source: keithley_6221, meter: keithley_2182a}
    vi_type: measurement
    init_params: {}
    metadata:
      role: DC source-and-measure (source + nanovoltmeter pair)
      manufacturer: Keithley
      model: 6221 + 2182A
  rotator:
    class: cryosoft.virtual_instruments.rotator.rotator.RotatorVI
    drivers: {main: rotator_drv}
    vi_type: system
    init_params:
      default_rate_deg_per_min: 1.0
      min_angle_deg: -180.0
      max_angle_deg: 180.0
      max_rate_deg_per_min: 10.0
    metadata:
      role: Sample rotation stage
      manufacturer: CryoSoft
      model: Sim rotator
  lockin_harmonic:
    class: cryosoft.virtual_instruments.measurement.lockin_harmonic.LockInHarmonicMeasurementVI
    drivers: {lockin: lockin_drv}
    vi_type: measurement
    init_params:
      series_resistance_ohm: 1.0e6
    metadata:
      role: Lock-in 1f/2f harmonic measurement (internal source)
      manufacturer: CryoSoft
      model: Sim lock-in
  switch_matrix:
    class: cryosoft.virtual_instruments.switch.switch_matrix.SwitchMatrixVI
    drivers: {main: k705}
    vi_type: switch
    init_params:
      # 4-pole: one channel switches all four leads of a 4-wire measurement,
      # mirroring the real 12t-cryo rack. This also halves the channel count
      # (10 in 4-pole vs 20 in 2-pole), so route channels must be 1..10.
      pole_mode: 4
      # Keithley 705 channels are plain numbers (Cnnn), not crosspoint specs:
      # verified against the manual and the instrument at bench commissioning.
      routes:
        Mux-Ch1: ["1"]
        Mux-Ch2: ["2"]
        Mux-Ch3: ["3"]
        Mux-Ch4: ["4"]
      settle_time_s: 0.0
    metadata:
      role: Sample multiplexer
      manufacturer: Keithley
      model: 705

# Cryogenics management (docs/plans/cryogenics-logbook.md §9): the helium
# fill operation, the consumption display, and the automatic helium-record
# recorder are all built around this block. Absent on a setup that doesn't
# need the feature -> zero footprint, zero code changes.
cryogenics:
  level_vi: level_meter
  helium_warning_pct: 35.0       # advisory; must exceed level_meter's helium_low_threshold (20.0)
  fill_target_pct: 90.0
  fill_zero_field_eps_T: 0.005
  fill_zero_field_window_s: 10.0
  fill_complete_window_s: 120.0
  max_fill_duration_s: 3600.0
  sample_period_s: 10.0          # fill-time sampling (FAST mode)
  history_sample_s: 3600.0       # helium record cadence -- hourly
  helium_volume_l: 40.0          # optional; enables L/h display

servicing_logs:                  # which declared log kinds this setup keeps
  - servicing

# Cryostat-servicing operations (docs/plans/cryogenics-logbook.md §9). Each
# named sub-block configures one OperationBase subclass; a setup that omits
# an operation's block still gets that operation's class-level defaults
# (read_operations_config() only fills in what's declared here).
operations:
  sample_change:
    vti_vi: temperature_vti
    target_temperature_K: 300.0
    temperature_tolerance_K: 2.0
    temperature_window_s: 60.0
    zero_field_eps_T: 0.005
    zero_field_window_s: 10.0
    needle_valve: manual           # "manual" -> operator confirmation; a VI-capability ref is future work
