# Cryostat Mock Configuration
# ===========================
#
# This configuration uses mock drivers for hardware-free testing
# and development. All devices are simulated.
#
# To use: Cryostat('cryostat/config/cryostat_mock.yaml')

cryostat:
  devices:
    # Temperature Controllers
    vti_temp_controller:
      type: temperature
      driver: mock_itc503
      resource: "mock"
      actions: TemperatureActions
      description: "VTI (Variable Temperature Insert) Temperature Controller"

    sample_temp_controller:
      type: temperature
      driver: mock_itc503
      resource: "mock"
      actions: TemperatureActions
      description: "Sample Space Temperature Controller"

    # Magnet Power Supplies
    magnet1:
      type: magnet
      driver: mock_ips120
      resource: "mock"
      actions: MagnetActions
      description: "Main Magnet (Z-axis)"
      field_range: [-7, 7]  # Tesla

    magnet2:
      type: magnet
      driver: mock_ips120
      resource: "mock"
      actions: MagnetActions
      description: "Vector Magnet X-axis"
      field_range: [-2, 2]  # Tesla

    magnet3:
      type: magnet
      driver: mock_ips120
      resource: "mock"
      actions: MagnetActions
      description: "Vector Magnet Y-axis"
      field_range: [-2, 2]  # Tesla

    # Level Meters
    helium_level_meter:
      type: level_meter
      driver: mock_ilm
      resource: "mock"
      actions: LevelMeterActions
      description: "Helium and Nitrogen Level Meter"
      num_channels: 2

# Logging Configuration
logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s [%(levelname)8s] %(name)s - %(message)s"
  file: "cryostat.log"
  console: true

# System Settings
system:
  lock_timeout: 1.0  # seconds
  default_sweep_rate_magnet: 0.1  # T/min
  default_ramp_rate_temperature: 1.0  # K/min
