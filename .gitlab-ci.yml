# CryoSoft CI for GitLab — ready for the planned migration from GitHub.
#
# Inert while the repo is hosted on GitHub. Mirrors .github/workflows/ci.yml:
# both are thin wrappers that call the same Makefile targets, so checks added
# to the Makefile apply to both CI systems without editing either file.

image: python:3.11

variables:
  QT_QPA_PLATFORM: "offscreen"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

checks:
  script:
    - apt-get update && apt-get install -y --no-install-recommends
      make libegl1 libgl1 libglib2.0-0 libfontconfig1 libxkbcommon0 libdbus-1-3
    - make install
    - make lint
    - make contracts
    - make test
    - make typecheck || true # advisory, never fails the pipeline
